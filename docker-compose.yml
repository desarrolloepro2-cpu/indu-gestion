version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: person_app
    ports:
      - "80:80"
    restart: always
    depends_on:
      - db

  db:
    image: mariadb:10.11
    container_name: person_db
    environment:
      MYSQL_ROOT_PASSWORD: secure_root_password
      MYSQL_DATABASE: person_db
      MYSQL_USER: person_user
      MYSQL_PASSWORD: secure_password
    ports:
      - "3306:3306"
    volumes:
      - /dockerDoc/person_db:/var/lib/mysql
    restart: always
